<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Logic | Nataly Santana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #0ea5e9; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { background: var(--primary); border-bottom: 3px solid var(--accent); padding: 1rem 0; }
        .nav-logo { font-weight: 800; font-size: 1.6rem; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 60px 0; text-align: center; }
        .contact-section { background: #f1f5f9; padding: 80px 0; }
        .contact-form { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .btn-submit { background: var(--primary); color: white; font-weight: 700; padding: 15px; border-radius: 12px; border: none; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-submit:hover { background: var(--accent); transform: translateY(-2px); }
        footer { background: var(--primary); color: white; padding: 40px 0; text-align: center; border-top: 4px solid var(--accent); }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container text-center">
            <a class="nav-logo justify-content-center" href="#">🦷 DENTAL<span>LOGIC</span></a>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="fw-bold">Contacto Profesional</h1>
            <p class="lead">Nataly Santana | Desarrollo de Software Dental</p>
        </div>
    </header>

    <section class="contact-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="contact-form">
                        <h3 class="fw-bold text-center mb-4">Envíame un mensaje</h3>
                        
                        <form action="https://formsubmit.co/n.santanam35@gmail.com" method="POST">
                            <input type="hidden" name="_captcha" value="false">
                            <input type="hidden" name="_subject" value="Nuevo contacto desde Dental Logic">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Nombre</label>
                                <input type="text" name="name" class="form-control" placeholder="Tu nombre" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Email</label>
                                <input type="email" name="email" class="form-control" placeholder="tu@correo.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Mensaje</label>
                                <textarea name="message" class="form-control" rows="4" placeholder="¿Cómo puedo ayudarte?" required></textarea>
                            </div>
                            <button type="submit" class="btn-submit">Enviar Mensaje 🚀</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p class="small mb-0">Nataly Santana | Valdivia, Chile</p>
        </div>
    </footer>

</body>
</html>
