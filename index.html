<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dental Logic | Nataly Santana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00d2ff; --dark: #1a1a1a; }
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .navbar { background: white; border-bottom: 4px solid var(--accent); padding: 15px 0; }
        /* El Contador: Negro con borde Cyan para que se vea claro */
        .cart-status { background: var(--dark); color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; border: 2px solid var(--accent); }
        #cart-count { color: var(--accent); font-size: 1.3rem; margin-left: 5px; }
        .hero { background: white; padding: 40px 0; border-bottom: 1px solid #eee; margin-bottom: 30px; }
        .btn-buy { background: var(--dark); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-3" href="#">DENTAL<span style="color:var(--accent)">LOGIC</span></a>
            <div class="cart-status">
                🛒 PRODUCTOS: <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero text-center">
        <div class="container">
            <h1 class="fw-bold">Software para Laboratorios Dentales</h1>
            <p class="text-muted">Desarrollado por Nataly Santana</p>
            <img src="https://images.unsplash.com/photo-1551076805-e1869033e561?q=80&w=600" class="img-fluid rounded-4 shadow-sm mt-3" style="max-height: 200px;">
        </div>
    </header>

    <main class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-0">
                    <h5 class="fw-bold">LabFlow Pro</h5>
                    <p class="small text-muted">Gestión de órdenes técnicas.</p>
                    <h4 class="text-info fw-bold">$85.000</h4>
                    <button class="btn-buy btn-add-cart" data-id="LFP">Comprar Ahora</button>
                </div>
            </div>
            </div>
    </main>

    <script>
        let carrito = JSON.parse(localStorage.getItem('dental-logic-cart')) || [];
        
        function actualizar() {
            const display = document.getElementById('cart-count');
            if (display) {
                display.innerText = carrito.length;
                localStorage.setItem('dental-logic-cart', JSON.stringify(carrito));
            }
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-add-cart')) {
                carrito.push(e.target.dataset.id);
                e.target.innerText = "¡Agregado! ✅";
                setTimeout(() => { e.target.innerText = "Comprar Ahora"; }, 800);
                actualizar();
            }
        });
        window.onload = actualizar;
    </script>
</body>
</html>
