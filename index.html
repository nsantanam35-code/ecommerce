<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Logic | Checkout WhatsApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00d2ff; --dark: #1a1a1a; --wa: #25d366; }
        body { background: #f8f9fa; font-family: sans-serif; padding-bottom: 120px; }
        .navbar { background: white; border-bottom: 4px solid var(--accent); padding: 15px 0; }
        .cart-status { background: var(--dark); color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; border: 2px solid var(--accent); }
        .card { border-radius: 20px; border: none; transition: 0.3s; background: white; }
        .btn-buy { background: var(--dark); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
        
        /* BOTÓN WHATSAPP: Ahora con z-index altísimo y visible por defecto para pruebas */
        #whatsapp-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--wa);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            display: none; /* Se activa con JS */
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-3" href="#">DENTAL<span style="color:var(--accent)">LOGIC</span></a>
            <div class="cart-status">🛒 PRODUCTOS: <span id="cart-count">0</span></div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm text-center">
                    <h5 class="fw-bold">LabFlow Pro</h5>
                    <p class="price h4 text-info fw-bold">$85.000</p>
                    <button class="btn-buy btn-add-cart" data-name="LabFlow Pro">Comprar Ahora</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 shadow-sm text-center">
                    <h5 class="fw-bold">AlloyCalc Python</h5>
                    <p class="price h4 text-info fw-bold">$32.500</p>
                    <button class="btn-buy btn-add-cart" data-name="AlloyCalc Python">Comprar Ahora</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 shadow-sm text-center">
                    <h5 class="fw-bold">StockDental AI</h5>
                    <p class="price h4 text-info fw-bold">$54.900</p>
                    <button class="btn-buy btn-add-cart" data-name="StockDental AI">Comprar Ahora</button>
                </div>
            </div>
        </div>
    </main>

    <a href="#" id="whatsapp-btn">
        ENVIAR PEDIDO A WHATSAPP 📲
    </a>

    <script>
        let carrito = [];
        const num = "56959530948";

        function render() {
            const count = document.getElementById('cart-count');
            const btn = document.getElementById('whatsapp-btn');
            
            count.innerText = carrito.length;
            
            if(carrito.length > 0) {
                btn.style.display = "block";
                let text = "Hola Nataly, quiero comprar:%0A";
                carrito.forEach(i => text += "- " + i + "%0A");
                btn.href = "https://wa.me/" + num + "?text=" + text;
            } else {
                btn.style.display = "none";
            }
        }

        document.addEventListener('click', (e) => {
            if(e.target.classList.contains('btn-add-cart')) {
                const item = e.target.getAttribute('data-name');
                carrito.push(item);
                
                e.target.innerText = "¡Añadido! ✅";
                setTimeout(() => { e.target.innerText = "Comprar Ahora"; }, 600);
                
                render();
            }
        });
    </script>
</body>
</html>
