<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Logic | Nataly Santana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="nav-logo" href="#">DENTAL<span>LOGIC</span></a>
            <button class="btn-cart-nav shadow-sm" data-bs-toggle="offcanvas" data-bs-target="#cartSide">
                🛒 Carrito (<span id="count">0</span>)
            </button>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="fw-bold">Precisión Clínica Digital</h1>
            <p class="lead opacity-75">Soluciones Python especializadas por Nataly Santana.</p>
        </div>
    </header>

    <main class="container py-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="product-card p-3">
                    <div class="img-wrapper rounded-4"><img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=400" class="card-img-top"></div>
                    <div class="p-2">
                        <span class="badge-tech">Workflow</span>
                        <h5 class="fw-bold">LabFlow Pro</h5>
                        <div class="price-tag">$85.000</div>
                        <button class="btn-add" onclick="add('LabFlow Pro', 85000)">Añadir al Carrito</button>
                    </div>
                </div>
            </div>
            </div>
    </main>

    <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="cartSide">
        <div class="offcanvas-header bg-dark text-white p-4">
            <h5 class="fw-bold mb-0">TU SELECCIÓN</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-4">
            <div id="cartList"></div>
            <div class="mt-4 p-4 bg-light rounded-4 d-flex justify-content-between h4 fw-bold">
                <span>Total:</span><span id="totalPrice">$0</span>
            </div>
            <a href="#" id="waCheck" class="btn btn-success w-100 py-3 mt-3 fw-bold rounded-4 shadow" style="display:none;">IR A PAGAR 💳</a>
        </div>
    </div>

    <a href="https://wa.me/56959530948" class="wa-float" target="_blank">📲</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
